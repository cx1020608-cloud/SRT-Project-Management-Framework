<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Project Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">P</div>
                    <div class="logo-text"><span class="logo-title">ProjectIQ</span><span class="logo-sub">Intelligence Platform</span></div>
                </div>
            </div>
            <div class="sidebar-label" data-i18n="nav_main">MAIN</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="overview"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span data-i18n="nav_overview">Overview</span></a>
                <a href="#" class="nav-item" data-view="pipeline"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span data-i18n="nav_pipeline">Pipeline</span></a>
                <a href="#" class="nav-item" data-view="performance"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span data-i18n="nav_performance">Performance</span></a>
                <a href="#" class="nav-item" data-view="projects"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span data-i18n="nav_projects">Projects</span></a>
            </nav>
            <div class="sidebar-label" data-i18n="nav_insights">INSIGHTS</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" data-view="channels"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-i18n="nav_channels">Channel</span></a>
                <a href="#" class="nav-item" data-view="hardware"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg><span data-i18n="nav_hardware">Hardware</span></a>
            </nav>
            <div class="sidebar-label" data-i18n="nav_marketing">MARKETING</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" data-view="market"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span data-i18n="nav_market">Market Intel</span></a>
                <a href="#" class="nav-item" data-view="funnel"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg><span data-i18n="nav_funnel">Funnel</span></a>
                <a href="#" class="nav-item" data-view="channelroi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span data-i18n="nav_channelroi">Channel ROI</span></a>
                <a href="#" class="nav-item" data-view="pmfit"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span data-i18n="nav_pmfit">Product-Market</span></a>
            </nav>
            <div class="sidebar-label" data-i18n="nav_strategy">STRATEGY</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" data-view="decisions"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span data-i18n="nav_decisions">Decision Board</span></a>
                <a href="#" class="nav-item" data-view="news"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V9m2 11a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9m6 4H9m4 4H9"/></svg><span data-i18n="nav_news">Industry News</span></a>
            </nav>
            <div class="sidebar-label" data-i18n="nav_meeting">MEETING</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" data-view="weekly"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg><span data-i18n="nav_weekly">Weekly Review</span></a>
            </nav>
            <div class="sidebar-footer"><span class="data-ver">Data Ver 5.1</span><span id="updateTime"></span></div>
        </aside>
        <main class="main">
            <header class="header">
                <div class="header-left">
                    <button class="icon-btn" id="sidebarToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                    <h1 class="header-title" id="headerTitle" data-i18n="nav_overview">Overview</h1>
                </div>
                <div class="header-right">
                    <div class="header-filters">
                        <select id="gfYear" class="gf-sel"><option value="">All Years</option></select>
                        <select id="gfQuarter" class="gf-sel"><option value="">All Q</option><option value="1">Q1</option><option value="2">Q2</option><option value="3">Q3</option><option value="4">Q4</option></select>
                    </div>
                    <div class="search-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="globalSearch" data-i18n-placeholder="search_placeholder" placeholder="Search..."></div>
                    <button class="lang-btn" id="langToggle"><span id="langLabel">日本語</span></button>
                </div>
            </header>
            <div class="content" id="contentArea"></div>
        </main>
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="drawer" id="drawer">
            <div class="drawer-head"><div><div class="drawer-title" id="drawerTitle"></div><div class="drawer-sub" id="drawerSub"></div></div><button class="icon-btn drawer-close" id="drawerClose">&times;</button></div>
            <div class="drawer-body" id="drawerBody"></div>
        </div>
    </div>
    <script src="i18n.js"></script>
    <script src="app.js"></script>
    <script src="marketing.js"></script>
</body>
</html>
